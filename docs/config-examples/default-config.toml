# Place a copy of this config to ~/.airlock.toml
# After that, you can edit ~/.airlock.toml to your liking

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# You can use it to add commands that run after Airlock startup.
after-startup-command = []

# Start Airlock at login
start-at-login = false

# Automatically reload the config when the config file is saved
# After setting this to true, reload once manually to start the auto-reloading
auto-reload-config = false

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-option-h key
automatically-unhide-macos-hidden-apps = false

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config option is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "A", "B",
                         "C", "D", "E", "F", "G", "I", "M", "N", "O", "P", "Q",
                         "R", "S", "T", "U", "V", "W", "X", "Y", "Z"]

# A callback that runs every time binding mode changes
on-mode-changed = []

# Possible values: (qwerty|dvorak|colemak)
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
[gaps]
    inner.horizontal = 0
    inner.vertical =   0
    outer.left =       0
    outer.bottom =     0
    outer.top =        0
    outer.right =      0

# 'main' binding mode declaration
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, option, ctrl, shift

    # You can uncomment the following lines to open up terminal with option + enter shortcut
    # (like in i3)
    # option-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

    option-slash = 'layout tiles horizontal vertical'
    option-comma = 'layout accordion horizontal vertical'

    # Workspace isolation: cmd-tab/cmd-backtick cycle within the current workspace only
    cmd-tab = 'focus app-next'
    shift-cmd-tab = 'focus app-prev'
    cmd-backtick = 'focus same-app-next'
    shift-cmd-backtick = 'focus same-app-prev'

    option-h = 'focus left'
    option-j = 'focus down'
    option-k = 'focus up'
    option-l = 'focus right'

    option-shift-h = 'move left'
    option-shift-j = 'move down'
    option-shift-k = 'move up'
    option-shift-l = 'move right'

    option-minus = 'resize smart -50'
    option-equal = 'resize smart +50'

    option-1 = 'workspace 1'
    option-2 = 'workspace 2'
    option-3 = 'workspace 3'
    option-4 = 'workspace 4'
    option-5 = 'workspace 5'
    option-6 = 'workspace 6'
    option-7 = 'workspace 7'
    option-8 = 'workspace 8'
    option-9 = 'workspace 9'
    option-a = 'workspace A' # In your config, you can drop workspace bindings that you don't need
    option-b = 'workspace B'
    option-c = 'workspace C'
    option-d = 'workspace D'
    option-e = 'workspace E'
    option-f = 'workspace F'
    option-g = 'workspace G'
    option-i = 'workspace I'
    option-m = 'workspace M'
    option-n = 'workspace N'
    option-o = 'workspace O'
    option-p = 'workspace P'
    option-q = 'workspace Q'
    option-r = 'workspace R'
    option-s = 'workspace S'
    option-t = 'workspace T'
    option-u = 'workspace U'
    option-v = 'workspace V'
    option-w = 'workspace W'
    option-x = 'workspace X'
    option-y = 'workspace Y'
    option-z = 'workspace Z'

    option-shift-1 = 'move-node-to-workspace 1'
    option-shift-2 = 'move-node-to-workspace 2'
    option-shift-3 = 'move-node-to-workspace 3'
    option-shift-4 = 'move-node-to-workspace 4'
    option-shift-5 = 'move-node-to-workspace 5'
    option-shift-6 = 'move-node-to-workspace 6'
    option-shift-7 = 'move-node-to-workspace 7'
    option-shift-8 = 'move-node-to-workspace 8'
    option-shift-9 = 'move-node-to-workspace 9'
    option-shift-a = 'move-node-to-workspace A'
    option-shift-b = 'move-node-to-workspace B'
    option-shift-c = 'move-node-to-workspace C'
    option-shift-d = 'move-node-to-workspace D'
    option-shift-e = 'move-node-to-workspace E'
    option-shift-f = 'move-node-to-workspace F'
    option-shift-g = 'move-node-to-workspace G'
    option-shift-i = 'move-node-to-workspace I'
    option-shift-m = 'move-node-to-workspace M'
    option-shift-n = 'move-node-to-workspace N'
    option-shift-o = 'move-node-to-workspace O'
    option-shift-p = 'move-node-to-workspace P'
    option-shift-q = 'move-node-to-workspace Q'
    option-shift-r = 'move-node-to-workspace R'
    option-shift-s = 'move-node-to-workspace S'
    option-shift-t = 'move-node-to-workspace T'
    option-shift-u = 'move-node-to-workspace U'
    option-shift-v = 'move-node-to-workspace V'
    option-shift-w = 'move-node-to-workspace W'
    option-shift-x = 'move-node-to-workspace X'
    option-shift-y = 'move-node-to-workspace Y'
    option-shift-z = 'move-node-to-workspace Z'

    # Reset to baseline: move singleton apps back to workspace 1
    # Customize the app bundle IDs to match your setup.
    # Run `~/.local/bin/airlock list-apps --format '%{app-bundle-id} %{app-name}'` to find bundle IDs.
    option-shift-0 = '''exec-and-forget bash -c '
        AIRLOCK="$HOME/.local/bin/airlock"
        for app_id in com.tinyspeck.slackmacgap com.spotify.client com.github.GitHubClient; do
            for wid in $("$AIRLOCK" list-windows --monitor all --app-bundle-id "$app_id" --format "%{window-id}"); do
                "$AIRLOCK" move-node-to-workspace --window-id "$wid" 1
            done
        done
    ' '''

    option-tab = 'workspace-back-and-forth'
    option-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    option-shift-semicolon = 'mode service'

# 'service' binding mode declaration.
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']

    #s = ['layout sticky tiling', 'mode main']

    option-shift-h = ['join-with left', 'mode main']
    option-shift-j = ['join-with down', 'mode main']
    option-shift-k = ['join-with up', 'mode main']
    option-shift-l = ['join-with right', 'mode main']
